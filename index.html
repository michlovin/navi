<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <!-- Prevents mobile browsers from zooming/scaling — sketch fills the screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- iOS full-screen / status bar tweaks -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0816">
    <title>Navi ✨</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;           /* no scroll bars */
        background: #0c0816;        /* matches sketch bg while loading */
        touch-action: none;         /* prevent browser pan/zoom gestures */
      }
      canvas {
        display: block;
        touch-action: none;         /* critical — lets our JS handle all touch */
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  </head>
  <body>
    <script src="sketch.js"></script>
  </body>
</html>
